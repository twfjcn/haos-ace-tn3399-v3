name: Multi-Target Build
on:
  workflow_dispatch:
  #schedule:
  #  - cron: '0 0 28 * ?'  #  每月28日0时编译，cron表达式，格式为分 时 日 月 周
  #push:
  #  branches: ["master"]
env:
  GIT_TERMINAL_PROMPT: 0  # 禁用终端提示
  GIT_SUBMODULE_STRATEGY: recursive  # 强制递归初始化子模块
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用Node.js 24，解决弃用警告
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate target matrix
        id: set-matrix
        run: |
          # 定义目标列表
          TARGETS='["tn3399_v3"]'
          echo "matrix=$TARGETS" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    name: Build ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4.2.0  # 升级到稳定版，适配Node.js 24
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0  # 升级到v3，适配Node.js 24

      - name: Initialization environment and Free up disk space
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          # 精简清理步骤，避免误删必要依赖
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get -qq update -y
          sudo apt-get -qq autoremove --purge -y
          sudo apt-get -qq clean -y
          # 安装必要依赖（openssl备用，若需要生成证书）
          sudo apt-get -qq install -y openssl make gcc
          df -h

      - name: Write keys to correct path
        run: |
          # 1. 确保/build目录存在
          sudo mkdir -p /build
          sudo chmod 777 /build  # 赋予读写权限
          
          # 2. 写入证书到项目目录（保留原有逻辑）
          echo "${{ secrets.MID_KEY_PEM }}" > ./operating-system/key.pem
          echo "${{ secrets.MID_CERT_PEM }}" > ./operating-system/cert.pem
          
          # 3. 关键：将证书拷贝/软链接到编译期望的/build目录
          cp ./operating-system/key.pem /build/key.pem
          cp ./operating-system/cert.pem /build/cert.pem
          
          # 验证文件是否存在
          ls -l /build/ | grep pem
          if [ ! -f /build/cert.pem ]; then
            echo "Error: /build/cert.pem still missing!"
            exit 1
          fi

      - name: Build HAOS-ACE with retry
        shell: 'script -q -e -c "bash {0}"'
        run: |
          max_retries=3
          count=0
          until ./build.sh ${{ matrix.target }}; do
            count=$((count+1))
            [[ $count -ge $max_retries ]] && exit 1
            echo "Build failed, retrying in 30s (attempt $count/$max_retries)..."
            sleep 30
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: output/images/haos*
          if-no-files-found: error  # 无文件时触发错误，便于排查

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: output/images/haos*
          tag_name: ${{ github.ref_name }}
          name: "Haos-ace Release ${{ github.ref_name }} (${{ steps.date.outputs.DATE }})"
          body: |
            自动化构建的应用服务，包含以下文件：
            - haos*.img.xz  压缩烧写镜像
            - haos*.raucb   OTA 更新包

            * 版本: ${{ github.ref_name }}
            * Commit: ${{ github.sha }}
            * 版本信息: 
              ${{ github.event.head_commit.message }}
            * 提交者: ${{ github.event.head_commit.author.name }}
          draft: false
